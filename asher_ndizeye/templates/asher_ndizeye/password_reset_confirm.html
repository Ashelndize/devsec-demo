{% extends "asher_ndizeye/base.html" %}
{% block content %}
<h2>Set New Password</h2>
{% if validlink %}
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Change My Password</button>
    </form>
{% else %}
    <p style="color: red;">The password reset link was invalid, possibly because it has already been used.</p>
    <a href="{% url 'asher_ndizeye:password_reset' %}">Request a new link</a>
{% endif %}
{% endblock %}
