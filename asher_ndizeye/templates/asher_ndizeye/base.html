<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}UAS{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .messages { list-style: none; padding: 0; }
        .messages li { padding: 10px; margin: 5px 0; border-radius: 4px; }
        .messages .success { background: #d4edda; color: #155724; }
        .messages .error { background: #f8d7da; color: #721c24; }
        .messages .warning { background: #fff3cd; color: #856404; }
        .messages .info { background: #d1ecf1; color: #0c5460; }
        input { display: block; width: 100%; padding: 8px; margin: 5px 0 15px; box-sizing: border-box; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        nav { margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #ddd; }
        nav a { margin-right: 15px; text-decoration: none; color: #007bff; }
        nav a:hover { text-decoration: underline; }
        .staff-link { color: #dc3545; font-weight: bold; }
        .errorlist { color: red; font-size: 0.9em; }
    </style>
</head>
<body>
    <nav>
        {% if user.is_authenticated %}
            <a href="{% url 'asher_ndizeye:dashboard' %}">Dashboard</a>
            <a href="{% url 'asher_ndizeye:profile' %}">Profile</a>
            <a href="{% url 'asher_ndizeye:change_password' %}">Change Password</a>
            
            {% if user.is_staff %}
                <a href="{% url 'asher_ndizeye:staff_dashboard' %}" class="staff-link">Staff Panel</a>
            {% endif %}
            
            <a href="{% url 'asher_ndizeye:logout' %}">Logout</a>
        {% else %}
            <a href="{% url 'asher_ndizeye:login' %}">Login</a>
            <a href="{% url 'asher_ndizeye:register' %}">Register</a>
        {% endif %}
    </nav>

    {% if messages %}
    <ul class="messages">
        {% for message in messages %}
        <li class="{{ message.tags }}">{{ message }}</li>
        {% endfor %}
    </ul>
    {% endif %}

    {% block content %}{% endblock %}
</body>
</html>
